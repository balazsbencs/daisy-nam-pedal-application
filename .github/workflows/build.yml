name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Create a draft GitHub release ──────────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
      tag: ${{ steps.create.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: nam-platform-app

      - name: Create draft release
        id: create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(jq -r '.version' nam-platform-app/src-tauri/tauri.conf.json)
          SHORT_SHA="${GITHUB_SHA:0:7}"
          TAG="v${VERSION}-${SHORT_SHA}"
          # Use the API directly so we get the release ID back without a second
          # lookup — gh api /releases/tags/{tag} 404s on draft releases because
          # the git tag hasn't been created yet.
          RESPONSE=$(gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/releases" \
            -f tag_name="$TAG" \
            -f name="NAM Platform v${VERSION} (${SHORT_SHA})" \
            -f body="Built from commit ${GITHUB_SHA}" \
            -F draft=true)
          RELEASE_ID=$(echo "$RESPONSE" | jq -r '.id')
          echo "release_id=${RELEASE_ID}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

  # ── Per-platform builds ─────────────────────────────────────────────────────
  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      # ── Checkouts ────────────────────────────────────────────────────────────
      - name: Checkout nam-platform-app
        uses: actions/checkout@v4
        with:
          path: nam-platform-app

      - name: Checkout nam-binary-loader
        uses: actions/checkout@v4
        with:
          repository: tone-3000/nam-binary-loader
          path: nam-binary-loader

      # NeuralAmpModelerCore ships Eigen + nlohmann as submodules
      - name: Checkout NeuralAmpModelerCore
        uses: actions/checkout@v4
        with:
          repository: sdatkinson/NeuralAmpModelerCore
          submodules: recursive
          path: NeuralAmpModelerCore

      # ── Toolchains ───────────────────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: nam-platform-app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Rust build cache — speeds up incremental Tauri recompiles on CI
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: nam-platform-app/src-tauri -> target

      # ── Build nam2namb ────────────────────────────────────────────────────────
      - name: Configure nam2namb (CMake)
        working-directory: nam-binary-loader
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DNAM_CORE_PATH=${{ github.workspace }}/NeuralAmpModelerCore

      - name: Build nam2namb
        working-directory: nam-binary-loader
        run: cmake --build build --config Release --target nam2namb

      # MSVC puts the binary in build/Release/; single-config generators use build/
      - name: Stage nam2namb sidecar
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            SRC="nam-binary-loader/build/Release/nam2namb.exe"
            DEST="nam-platform-app/src-tauri/binaries/nam2namb-${{ matrix.target }}.exe"
          else
            SRC="nam-binary-loader/build/nam2namb"
            DEST="nam-platform-app/src-tauri/binaries/nam2namb-${{ matrix.target }}"
          fi
          cp "$SRC" "$DEST"

      # ── dfu-util sidecar ─────────────────────────────────────────────────────
      - name: Stage dfu-util sidecar (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install dfu-util
          cp "$(which dfu-util)" \
             "nam-platform-app/src-tauri/binaries/dfu-util-${{ matrix.target }}"

      # Install dfu-util via MSYS2/MinGW64 — the reliable package-managed route.
      # NOTE: libusb-1.0.dll must be distributed alongside the app on Windows;
      # add it to tauri.conf.json bundle.resources once the installer is set up.
      - name: Install dfu-util via MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: mingw-w64-x86_64-dfu-util

      - name: Stage dfu-util sidecar (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          cp /mingw64/bin/dfu-util.exe \
             "nam-platform-app/src-tauri/binaries/dfu-util-${{ matrix.target }}.exe"

      # ── Tauri build ──────────────────────────────────────────────────────────
      - name: Install npm dependencies
        working-directory: nam-platform-app
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: nam-platform-app
          args: --target ${{ matrix.target }}
          releaseId: ${{ needs.create-release.outputs.release_id }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing — set these secrets in your repo settings:
          # APPLE_CERTIFICATE          base64-encoded .p12
          # APPLE_CERTIFICATE_PASSWORD .p12 password
          # APPLE_SIGNING_IDENTITY     "Developer ID Application: ..."
          # APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID  for notarisation

  # ── Publish release once all builds succeed ─────────────────────────────────
  publish-release:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ needs.create-release.outputs.tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --draft=false
